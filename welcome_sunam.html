<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수남 초등학교 환영합니다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #020818;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Nanum Gothic', 'Malgun Gothic', sans-serif;
  }

  canvas#fireworks {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* Streamers top */
  .streamers {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 18px;
    display: flex;
    z-index: 11;
  }
  .streamer-seg {
    flex: 1;
    height: 18px;
    border-radius: 0 0 4px 4px;
  }

  /* Banner rope */
  .banner-rope {
    position: fixed;
    top: 18px; left: 0; right: 0;
    height: 28px;
    z-index: 11;
    overflow: visible;
    display: flex;
    align-items: center;
  }
  .banner-rope svg { width: 100%; height: 60px; overflow: visible; }

  /* Triangle flags */
  .flags-row {
    position: fixed;
    top: 60px; left: 0; right: 0;
    height: 36px;
    z-index: 11;
    display: flex;
    justify-content: center;
    gap: 0;
  }
  .flag-tri {
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid var(--c);
    margin: 0 2px;
    filter: drop-shadow(0 2px 6px var(--c));
  }

  /* Main card */
  .card {
    background: rgba(5, 15, 45, 0.72);
    border: 2px solid rgba(255, 220, 80, 0.55);
    border-radius: 24px;
    padding: 44px 56px 40px;
    text-align: center;
    box-shadow:
      0 0 60px rgba(255, 200, 50, 0.18),
      0 0 120px rgba(100, 160, 255, 0.12),
      inset 0 0 40px rgba(255, 220, 80, 0.04);
    max-width: 90vw;
    animation: cardFloat 4s ease-in-out infinite;
  }
  @keyframes cardFloat {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }

  .welcome-tag {
    display: inline-block;
    background: linear-gradient(90deg, #ffd700, #ff9f00);
    color: #1a0a00;
    font-size: clamp(0.75rem, 2vw, 1rem);
    font-weight: 800;
    letter-spacing: 0.18em;
    padding: 5px 20px;
    border-radius: 999px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .school-name {
    font-size: clamp(2.2rem, 8vw, 5.2rem);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #ffffff 0%, #ffeebb 40%, #ffe066 70%, #fff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(255, 220, 80, 0.9)) drop-shadow(0 0 8px #fff);
    animation: textGlow 2.4s ease-in-out infinite;
    margin-bottom: 10px;
  }
  @keyframes textGlow {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,220,80,0.8)) drop-shadow(0 0 6px #fff); }
    50%      { filter: drop-shadow(0 0 40px rgba(255,220,80,1.0)) drop-shadow(0 0 18px rgba(255,200,80,0.9)); }
  }

  .hwan-yeong {
    font-size: clamp(1.6rem, 5.5vw, 3.6rem);
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.05em;
    text-shadow:
      0 0 12px rgba(120, 200, 255, 0.9),
      0 0 30px rgba(100, 180, 255, 0.6);
    animation: hwPulse 1.8s ease-in-out infinite;
    margin-bottom: 24px;
  }
  @keyframes hwPulse {
    0%,100% { text-shadow: 0 0 12px rgba(120,200,255,0.8), 0 0 28px rgba(80,160,255,0.5); }
    50%      { text-shadow: 0 0 24px rgba(120,200,255,1.0), 0 0 56px rgba(80,160,255,0.8); }
  }

  .emoji-row {
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 0.15em;
    animation: emojiBounce 1.2s ease-in-out infinite;
    display: inline-block;
    margin-bottom: 22px;
  }
  @keyframes emojiBounce {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  .sub-text {
    font-size: clamp(0.85rem, 2.5vw, 1.2rem);
    color: rgba(200, 230, 255, 0.85);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }
  .sub-text span {
    color: #ffd54f;
    font-weight: 700;
  }

  /* Star dots */
  .star-dot {
    position: fixed;
    border-radius: 50%;
    background: white;
    z-index: 2;
    animation: twinkle var(--dur) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--lo); transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.5); }
  }

  /* Bottom ribbon */
  .bottom-ribbon {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 14px;
    display: flex;
    z-index: 11;
  }
</style>
</head>
<body>

<!-- Canvas layer -->
<canvas id="fireworks"></canvas>

<!-- Streamer top -->
<div class="streamers" id="streamers-top"></div>

<!-- Bunting flags -->
<div class="flags-row" id="flags"></div>

<!-- Main UI -->
<div class="ui">
  <div class="card">
    <div class="welcome-tag">Welcome &nbsp;·&nbsp; 환영</div>
    <div class="school-name">수남 초등학교</div>
    <div class="hwan-yeong">환영합니다! 🎉</div>
    <div class="emoji-row">🌟 🎊 🎈 🎆 🎇 🎈 🎊 🌟</div>
    <div class="sub-text">
      여러분을 진심으로 환영합니다!<br>
      <span>즐겁고 행복한 시간</span>이 되길 바랍니다 ✨
    </div>
  </div>
</div>

<!-- Bottom ribbon -->
<div class="bottom-ribbon" id="ribbon-bottom"></div>

<script>
// ============================================================
// STARS
// ============================================================
(function buildStars() {
  const colors = ['#fff','#ffeebb','#cce8ff','#ffccff'];
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const sz = Math.random() * 3 + 0.5;
    const lo = (Math.random() * 0.4 + 0.15).toFixed(2);
    const dur = (Math.random() * 3 + 2).toFixed(2) + 's';
    s.style.cssText = `
      left:${Math.random()*100}vw;
      top:${Math.random()*100}vh;
      width:${sz}px;height:${sz}px;
      --lo:${lo};--dur:${dur};
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${(Math.random()*4).toFixed(2)}s;
    `;
    document.body.appendChild(s);
  }
})();

// ============================================================
// STREAMERS & FLAGS
// ============================================================
(function buildDecor() {
  const palette = ['#ff4d6d','#ffbe0b','#3a86ff','#8338ec','#06d6a0','#ff006e','#fb5607','#80ffdb'];
  const top = document.getElementById('streamers-top');
  const bot = document.getElementById('ribbon-bottom');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'streamer-seg';
    s.style.background = palette[i % palette.length];
    top.appendChild(s);
    const b = s.cloneNode();
    b.style.borderRadius = '4px 4px 0 0';
    bot.appendChild(b);
  }

  const flags = document.getElementById('flags');
  for (let i = 0; i < 60; i++) {
    const f = document.createElement('div');
    f.className = 'flag-tri';
    f.style.setProperty('--c', palette[i % palette.length]);
    flags.appendChild(f);
  }
})();

// ============================================================
// FIREWORKS ENGINE
// ============================================================
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = [
  '#ff4d6d','#ff9f00','#ffef3a','#00e5ff','#7c4dff',
  '#f50057','#69f0ae','#ff6e40','#40c4ff','#e040fb',
  '#ffffff','#ffe066','#80ffdb','#ff80ab','#ccff90'
];

class Particle {
  constructor(x, y, color, vx, vy, size, life, gravity, fade) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = vx; this.vy = vy;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.gravity = gravity ?? 0.06;
    this.fade = fade ?? true;
    this.alpha = 1;
    this.trail = [];
  }
  update() {
    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
    if (this.trail.length > 6) this.trail.shift();
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.vy += this.gravity;
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    if (this.fade) this.alpha = this.life / this.maxLife;
  }
  draw(ctx) {
    // trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (i / this.trail.length) * this.alpha * 0.5;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.size * 3;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
  isDead() { return this.life <= 0; }
}

class Rocket {
  constructor() { this.reset(); }
  reset() {
    this.x = canvas.width * (0.15 + Math.random() * 0.7);
    this.y = canvas.height;
    const targetY = canvas.height * (0.1 + Math.random() * 0.45);
    const targetX = canvas.width * (0.1 + Math.random() * 0.8);
    const dist = Math.hypot(targetX - this.x, targetY - this.y);
    const speed = 8 + Math.random() * 5;
    this.vx = (targetX - this.x) / dist * speed;
    this.vy = (targetY - this.y) / dist * speed;
    this.targetY = targetY;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.trail = [];
    this.exploded = false;
    this.particles = [];
  }
  update(allParticles) {
    if (!this.exploded) {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 12) this.trail.shift();
      this.vy += 0.05; // gravity on rocket
      this.x += this.vx;
      this.y += this.vy;
      if (this.vy >= 0 || this.y <= this.targetY) {
        this.exploded = true;
        this.explode(allParticles);
      }
    }
  }
  explode(allParticles) {
    const type = Math.floor(Math.random() * 5);
    const count = 80 + Math.floor(Math.random() * 60);
    const c1 = COLORS[Math.floor(Math.random() * COLORS.length)];
    const c2 = COLORS[Math.floor(Math.random() * COLORS.length)];

    if (type === 0) {
      // Classic sphere
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const sp = 2 + Math.random() * 4;
        allParticles.push(new Particle(
          this.x, this.y,
          Math.random() < 0.5 ? c1 : c2,
          Math.cos(a) * sp, Math.sin(a) * sp,
          2 + Math.random() * 2,
          60 + Math.random() * 30
        ));
      }
    } else if (type === 1) {
      // Ring
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const sp = 4 + Math.random() * 0.5;
        allParticles.push(new Particle(
          this.x, this.y, c1,
          Math.cos(a) * sp, Math.sin(a) * sp,
          2.5, 55 + Math.random() * 20
        ));
      }
    } else if (type === 2) {
      // Star burst
      const points = 8;
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const arm = Math.floor(i / (count / points));
        const sp = arm % 2 === 0 ? 5 + Math.random() : 2 + Math.random();
        allParticles.push(new Particle(
          this.x, this.y, arm % 2 === 0 ? c1 : c2,
          Math.cos(a) * sp, Math.sin(a) * sp,
          arm % 2 === 0 ? 3 : 1.5,
          60 + Math.random() * 25
        ));
      }
    } else if (type === 3) {
      // Willow (droopy)
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        const sp = 1.5 + Math.random() * 3.5;
        allParticles.push(new Particle(
          this.x, this.y, c1,
          Math.cos(a) * sp, Math.sin(a) * sp,
          2, 90 + Math.random() * 30, 0.12
        ));
      }
    } else {
      // Double burst
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = Math.random() < 0.5 ? 1 + Math.random() * 2 : 4 + Math.random() * 3;
        allParticles.push(new Particle(
          this.x, this.y,
          Math.random() < 0.5 ? c1 : c2,
          Math.cos(a) * sp, Math.sin(a) * sp,
          sp > 3 ? 2.5 : 1.5,
          55 + Math.random() * 35
        ));
      }
    }

    // Flash center
    allParticles.push(new Particle(
      this.x, this.y, '#ffffff',
      0, 0, 12, 8, 0, true
    ));
  }
  draw(ctx) {
    if (this.exploded) return;
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = (i / this.trail.length) * 0.8;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 8;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  isDead() { return this.exploded; }
}

// Confetti
class Confetti {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : -20;
    this.w = 8 + Math.random() * 10;
    this.h = 5 + Math.random() * 6;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = 1.2 + Math.random() * 1.8;
    this.angle = Math.random() * Math.PI * 2;
    this.spin = (Math.random() - 0.5) * 0.18;
    this.alpha = 0.85 + Math.random() * 0.15;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.spin;
    this.vx += (Math.random() - 0.5) * 0.08;
    if (this.y > canvas.height + 20) this.reset(false);
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
}

// State
const rockets = [];
const particles = [];
const confetti = Array.from({ length: 60 }, () => new Confetti());
let frameCount = 0;
let nextLaunch = 0;

function launchRocket() {
  rockets.push(new Rocket());
}

// Auto-launch burst at start
setTimeout(() => { for (let i = 0; i < 5; i++) setTimeout(launchRocket, i * 250); }, 300);

function loop() {
  // Fade background (trail effect)
  ctx.fillStyle = 'rgba(2, 8, 24, 0.22)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  frameCount++;

  // Auto-launch
  if (frameCount >= nextLaunch) {
    const burst = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < burst; i++) {
      setTimeout(launchRocket, i * 160);
    }
    nextLaunch = frameCount + 55 + Math.floor(Math.random() * 55);
  }

  // Update & draw rockets
  for (let i = rockets.length - 1; i >= 0; i--) {
    rockets[i].update(particles);
    rockets[i].draw(ctx);
    if (rockets[i].isDead()) rockets.splice(i, 1);
  }

  // Update & draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw(ctx);
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  // Confetti
  confetti.forEach(c => { c.update(); c.draw(ctx); });

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
